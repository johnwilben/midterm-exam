const _DUR=2*60*60*1000;
const _API="https://script.google.com/macros/s/AKfycbwIKVPUQuxk268JDI8fEby9EORhx7rep_yDHiQGcloxGLdSHaVzKMLgX7qzGIi_rr1c/exec";
let _TI,_ST;

async function _H(s){
  const e=new TextEncoder().encode(_S+s);
  const h=await crypto.subtle.digest('SHA-256',e);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function attemptLogin(){
  const err=document.getElementById('error-msg');
  const btn=document.querySelector('.login-box button');
  const input=document.getElementById('password-input').value.trim().toUpperCase();
  const hash=await _H(input);
  const student=_D.find(s=>s.hash===hash);
  if(!student){err.textContent='Invalid password. Try again.';err.style.display='block';document.getElementById('password-input').value='';return}
  if(localStorage.getItem('exam_self_'+hash)){startExam(student.name,student.set);return}
  btn.textContent='Verifying...';btn.disabled=true;
  try{
    const check=await fetch(_API+'?hash='+encodeURIComponent(hash));
    const data=await check.json();
    if(data.status==='locked'){
      err.textContent='This password is already in use on another device.';err.style.display='block';btn.textContent='Access Exam';btn.disabled=false;document.getElementById('password-input').value='';return}
    fetch(_API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({hash:hash,name:student.name})});
    localStorage.setItem('exam_self_'+hash,'1');
    startExam(student.name,student.set);
  }catch(e){
    localStorage.setItem('exam_self_'+hash,'1');
    startExam(student.name,student.set);
  }
}

document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')attemptLogin()});

function startExam(name,set){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('exam-screen').style.display='block';
  document.getElementById('student-name').textContent=name;
  const encoded=_E[set]||'';
  document.getElementById('exam-content').innerHTML=atob(encoded);
  const saved=localStorage.getItem('exam_start_'+name);
  _ST=saved?parseInt(saved):Date.now();
  if(!saved)localStorage.setItem('exam_start_'+name,_ST);
  _TI=setInterval(updateTimer,1000);
  updateTimer();
}

function updateTimer(){
  const r=_DUR-(Date.now()-_ST);
  if(r<=0){clearInterval(_TI);document.getElementById('exam-screen').style.display='none';document.getElementById('expired-screen').style.display='flex';return}
  const h=Math.floor(r/3600000),m=Math.floor((r%3600000)/60000),s=Math.floor((r%60000)/1000);
  const el=document.getElementById('timer');
  el.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.className='timer'+(r<600000?' danger':r<1800000?' warning':'');
}
